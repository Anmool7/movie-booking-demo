<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- CITY -->
<div class="container mt-5" id="city">
  <h3>Select City</h3>
  <select class="form-select mt-3" id="citySelect">
    <option>Delhi</option>
    <option>Mumbai</option>
    <option>Jaipur</option>
  </select>
  <button class="btn btn-primary mt-3" onclick="goToMovies()">Continue</button>
</div>

<!-- MOVIES -->
<div class="container mt-5 d-none" id="movies">
    <h3 class="mb-4">Movies</h3>
  
    <div class="row g-4">
  
      <div class="col-md-4">
        <div class="card shadow-sm h-100">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSEhcSfVHv5xAL0vXZ_G4RNn7qsujdiWcbruQ&s" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">Dhurandhar The Revenge</h5>
            <p class="text-muted">⭐ 4.5 | 2h 30m</p>
            <button class="btn btn-primary w-100" onclick="goToTheatre()">Book Now</button>
          </div>
        </div>
      </div>
  
      <div class="col-md-4">
        <div class="card shadow-sm h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">Batman</h5>
            <p class="text-muted">⭐ 4.2 | 2h 10m</p>
            <button class="btn btn-primary w-100" onclick="goToTheatre()">Book Now</button>
          </div>
        </div>
      </div>
  
    </div>
  </div>
  

<!-- THEATRE + TIMING -->
<div class="container mt-5 d-none" id="theatre">
  <h3>Select Theatre & Time</h3>

  <div class="card p-3 mt-3">
    <h5>PVR Cinema</h5>
    <button class="btn btn-outline-primary m-1" onclick="selectShow('PVR - 10AM')">10:00 AM</button>
    <button class="btn btn-outline-primary m-1" onclick="selectShow('PVR - 2PM')">2:00 PM</button>
  </div>

  <div class="card p-3 mt-3">
    <h5>INOX</h5>
    <button class="btn btn-outline-primary m-1" onclick="selectShow('INOX - 11AM')">11:00 AM</button>
    <button class="btn btn-outline-primary m-1" onclick="selectShow('INOX - 3PM')">3:00 PM</button>
  </div>

</div>

<!-- SEAT -->
<div class="container mt-5 d-none" id="seat">
  <h3>Select Seats</h3>

  <div id="seats" class="mt-3"></div>
  <p id="selected">Selected Seats: None</p>

  <button class="btn btn-success" onclick="confirmBooking()">Confirm</button>
</div>

<!-- CONFIRM -->
<div class="container mt-5 text-center d-none" id="confirm"></div>

<script src="script.js"></script>
</body>
</html>
